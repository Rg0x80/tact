<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Outer circle -->
  <circle cx="130" cy="200" r="70" fill="none" stroke="#6366f1" stroke-width="5"/>

  <!-- Inner hexagon -->
  <polygon points="130,154 169.8,177 169.8,223 130,246 90.2,223 90.2,177"
           fill="url(#hexGrad)" opacity="0.85"/>

  <!-- Connecting lines -->
  <g stroke="white" stroke-opacity="0.7" stroke-width="3" stroke-linecap="round">
    <line x1="130" y1="200" x2="130" y2="154"/>
    <line x1="130" y1="200" x2="169.8" y2="177"/>
    <line x1="130" y1="200" x2="169.8" y2="223"/>
    <line x1="130" y1="200" x2="130" y2="246"/>
    <line x1="130" y1="200" x2="90.2" y2="223"/>
    <line x1="130" y1="200" x2="90.2" y2="177"/>
  </g>

  <!-- Vertex dots -->
  <g fill="#1e1b4b">
    <circle cx="130" cy="154" r="5"/>
    <circle cx="169.8" cy="177" r="5"/>
    <circle cx="169.8" cy="223" r="5"/>
    <circle cx="130" cy="246" r="5"/>
    <circle cx="90.2" cy="223" r="5"/>
    <circle cx="90.2" cy="177" r="5"/>
  </g>

  <!-- Center node -->
  <circle cx="130" cy="200" r="12" fill="#1e1b4b"/>

  <!-- Wordmark -->
  <text x="260" y="210" font-family="DejaVu Sans, Arial, sans-serif" font-weight="bold"
        font-size="96" fill="#1e1b4b">tact</text>

  <!-- Accent rule -->
  <rect x="268" y="228" width="175" height="3" rx="1.5" fill="#8b5cf6"/>

  <!-- Tagline -->
  <text x="268" y="268" font-family="DejaVu Sans, Arial, sans-serif"
        font-size="22" fill="#6366f1">thoughtful communication</text>
</svg>
