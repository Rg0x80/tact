<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f0e1a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Sparkle from hexagon -->
  <g transform="translate(180, 120)" opacity="0.3">
    <!-- Small sparkle top-right -->
    <path d="M0,-15 L3,-5 L15,0 L3,5 L0,15 L-3,5 L-15,0 L-3,-5 Z" fill="#a78bfa"/>
    <circle cx="0" cy="0" r="4" fill="#c7d2fe"/>
  </g>

  <!-- Main hexagon icon -->
  <g transform="translate(256, 240)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="120" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.3"/>
    <circle cx="0" cy="0" r="100" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.2"/>

    <!-- Hexagon -->
    <polygon points="0,-72 62.4,-36 62.4,36 0,72 -62.4,36 -62.4,-36"
             fill="url(#hexGrad)" opacity="0.9"/>

    <!-- Inner lines connecting to center -->
    <g stroke="white" stroke-opacity="0.15" stroke-width="2">
      <line x1="0" y1="-72" x2="0" y2="72"/>
      <line x1="-62.4" y1="-36" x2="62.4" y2="36"/>
      <line x1="-62.4" y1="36" x2="62.4" y2="-36"/>
    </g>

    <!-- Connections from center to vertices -->
    <g stroke="white" stroke-opacity="0.7" stroke-width="2.5" stroke-linecap="round">
      <line x1="0" y1="0" x2="0" y2="-72"/>
      <line x1="0" y1="0" x2="62.4" y2="-36"/>
      <line x1="0" y1="0" x2="62.4" y2="36"/>
      <line x1="0" y1="0" x2="0" y2="72"/>
      <line x1="0" y1="0" x2="-62.4" y2="36"/>
      <line x1="0" y1="0" x2="-62.4" y2="-36"/>
    </g>

    <!-- Vertex nodes -->
    <g fill="#c7d2fe">
      <circle cx="0" cy="-72" r="7"/>
      <circle cx="62.4" cy="-36" r="7"/>
      <circle cx="62.4" cy="36" r="7"/>
      <circle cx="0" cy="72" r="7"/>
      <circle cx="-62.4" cy="36" r="7"/>
      <circle cx="-62.4" cy="-36" r="7"/>
    </g>

    <!-- Center node -->
    <circle cx="0" cy="0" r="18" fill="#1e1b4b" stroke="#a78bfa" stroke-width="3"/>
    <circle cx="0" cy="0" r="9" fill="url(#hexGrad)"/>

    <!-- Cursor blink hint (terminal cursor) -->
    <rect x="-42" y="50" width="18" height="5" rx="2" fill="#22c55e" opacity="0.9"/>
    <rect x="-20" y="50" width="8" height="5" rx="2" fill="#22c55e" opacity="0.5"/>
  </g>
</svg>