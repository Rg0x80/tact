<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#312e81"/>
    </linearGradient>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
  </defs>

  <!-- Background: rounded rectangle -->
  <rect x="24" y="24" width="464" height="464" rx="96" fill="url(#bg)"/>

  <!-- Terminal prompt: ">_" -->
  <text x="130" y="340" font-family="monospace" font-weight="bold"
        font-size="128" fill="#6366f1">&gt;_</text>

  <!-- AI Node Graph (hexagon with connections) -->
  <g transform="translate(280, 180)">
    <!-- Outer glow ring -->
    <circle cx="64" cy="64" r="58" fill="none" stroke="#6366f1" stroke-width="3" opacity="0.5"/>

    <!-- Hexagon -->
    <polygon points="64,28 98.2,47 98.2,85 64,104 29.8,85 29.8,47"
             fill="url(#hexGrad)" opacity="0.9"/>

    <!-- Connections -->
    <g stroke="white" stroke-opacity="0.6" stroke-width="2.5" stroke-linecap="round">
      <line x1="64" y1="66" x2="64" y2="28"/>
      <line x1="64" y1="66" x2="98.2" y2="47"/>
      <line x1="64" y1="66" x2="98.2" y2="85"/>
      <line x1="64" y1="66" x2="64" y2="104"/>
      <line x1="64" y1="66" x2="29.8" y2="85"/>
      <line x1="64" y1="66" x2="29.8" y2="47"/>
    </g>

    <!-- Vertex nodes -->
    <g fill="#c7d2fe">
      <circle cx="64" cy="28" r="5"/>
      <circle cx="98.2" cy="47" r="5"/>
      <circle cx="98.2" cy="85" r="5"/>
      <circle cx="64" cy="104" r="5"/>
      <circle cx="29.8" cy="85" r="5"/>
      <circle cx="29.8" cy="47" r="5"/>
    </g>

    <!-- Center node -->
    <circle cx="64" cy="66" r="14" fill="url(#nodeGrad)" stroke="#c7d2fe" stroke-width="2"/>
  </g>
</svg>