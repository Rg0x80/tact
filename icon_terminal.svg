<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Terminal shape (rounded rectangle with "ears" like terminal icon) -->
  <g>
    <!-- Terminal body -->
    <rect x="64" y="100" width="384" height="312" rx="32" fill="#1e1b4b" stroke="#6366f1" stroke-width="6"/>

    <!-- Terminal title bar -->
    <rect x="64" y="100" width="384" height="56" rx="32" fill="#312e81"/>
    <rect x="64" y="124" width="384" height="32" fill="#312e81"/>

    <!-- Traffic lights -->
    <circle cx="104" cy="128" r="10" fill="#ef4444"/>
    <circle cx="140" cy="128" r="10" fill="#f59e0b"/>
    <circle cx="176" cy="128" r="10" fill="#22c55e"/>

    <!-- AI Hexagon logo inside terminal -->
    <g transform="translate(186, 200)">
      <!-- Hexagon -->
      <polygon points="70,20 110,43 110,89 70,112 30,89 30,43"
               fill="url(#hexGrad)" opacity="0.9"/>

      <!-- Connections -->
      <g stroke="white" stroke-opacity="0.7" stroke-width="3" stroke-linecap="round">
        <line x1="70" y1="66" x2="70" y2="20"/>
        <line x1="70" y1="66" x2="110" y2="43"/>
        <line x1="70" y1="66" x2="110" y2="89"/>
        <line x1="70" y1="66" x2="70" y2="112"/>
        <line x1="70" y1="66" x2="30" y2="89"/>
        <line x1="70" y1="66" x2="30" y2="43"/>
      </g>

      <!-- Vertex nodes -->
      <g fill="#c7d2fe">
        <circle cx="70" cy="20" r="6"/>
        <circle cx="110" cy="43" r="6"/>
        <circle cx="110" cy="89" r="6"/>
        <circle cx="70" cy="112" r="6"/>
        <circle cx="30" cy="89" r="6"/>
        <circle cx="30" cy="43" r="6"/>
      </g>

      <!-- Center node (pulse) -->
      <circle cx="70" cy="66" r="16" fill="#1e1b4b" stroke="#c7d2fe" stroke-width="2"/>
      <circle cx="70" cy="66" r="8" fill="#a78bfa"/>
    </g>
  </g>
</svg>